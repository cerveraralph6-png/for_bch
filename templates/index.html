<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH | Desktop Login</title>
    <link rel="stylesheet" href="../static/CSS/index.css">
</head>
<body class="login-bg">

    <div class="login-container">
        <div class="login-card">
            <img src="../static/Imag3s/baguio-logo-gov.png" alt="Logo" class="login-logo">
            <h2>BCH PORTAL</h2>
            <p>Enter passkey to access local database</p>

            <div class="input-group">
                <input type="password" id="passkey" placeholder="Secure Passkey" onkeyup="if(event.key==='Enter') attemptLogin()">
            </div>
            
            <div id="error-msg" class="error-text"></div>
            
            <button class="btn-unlock" onclick="attemptLogin()">Unlock System</button>
        </div>
    </div>

    <script src="../static/scripts/main.js"></script>
</body>
</html>
